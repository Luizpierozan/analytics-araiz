<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics — Entrar</title>
    <link rel="stylesheet" href="index.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-color); }
        .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 3rem 2.5rem; text-align: center; width: 100%; max-width: 380px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
        .login-logo { font-size: 1.75rem; font-weight: 700; color: var(--primary); letter-spacing: -0.02em; margin-bottom: 0.25rem; }
        .login-badge { display: inline-block; background: #DBEAFE; color: #1E40AF; font-size: 0.7rem; padding: 0.2rem 0.5rem; border-radius: 4px; font-weight: 600; margin-bottom: 2rem; }
        [data-theme="dark"] .login-badge { background: #1E3A5F; color: #93C5FD; }
        .login-subtitle { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 2.5rem; line-height: 1.5; }
        .btn-google { display: flex; align-items: center; justify-content: center; gap: 0.75rem; width: 100%; padding: 0.85rem 1.5rem; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; font-size: 0.95rem; font-weight: 500; color: var(--text-main); cursor: pointer; text-decoration: none; transition: 0.2s; font-family: 'Inter', sans-serif; }
        .btn-google:hover { border-color: var(--secondary); background: #EFF6FF; color: var(--secondary); }
        [data-theme="dark"] .btn-google:hover { background: #1E3A5F; }
        .btn-google svg { flex-shrink: 0; }
        .login-footer { margin-top: 2rem; font-size: 0.75rem; color: var(--text-muted); }
        .error-msg { background: #FEE2E2; color: #991B1B; border-radius: 8px; padding: 0.75rem 1rem; font-size: 0.85rem; margin-bottom: 1.5rem; display: none; }
        [data-theme="dark"] .error-msg { background: #450A0A; color: #FCA5A5; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-logo">Analytics</div>
        <span class="login-badge">Sênior</span>

        <div id="errorMsg" class="error-msg">Acesso não autorizado para este email.</div>

        <p class="login-subtitle">Área restrita à equipe<br><strong>A Raiz da Solução</strong></p>

        <a href="/auth/login" class="btn-google">
            <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
                <path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285F4"/>
                <path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z" fill="#34A853"/>
                <path d="M3.964 10.707A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 000 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/>
                <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.961L3.964 7.293C4.672 5.166 6.656 3.58 9 3.58z" fill="#EA4335"/>
            </svg>
            Entrar com Google
        </a>

        <p class="login-footer">Apenas emails @araizdasolucao.com</p>
    </div>

    <script>
        // Verifica se veio parâmetro de erro
        if (new URLSearchParams(window.location.search).get('erro') === '1') {
            document.getElementById('errorMsg').style.display = 'block';
        }
        // Tema salvo
        const t = localStorage.getItem('theme');
        if (t) document.documentElement.setAttribute('data-theme', t);
    </script>
</body>
</html>
